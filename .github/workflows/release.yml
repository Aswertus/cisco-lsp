name: Release

# Build the .vsix and publish a GitHub Release whenever a version tag is pushed.
# Usage: bump "version" in package.json, then:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # required for the built-in GITHUB_TOKEN to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npm run package # runs lint via vscode:prepublish, then `vsce package`

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
