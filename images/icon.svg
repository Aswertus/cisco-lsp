<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E3566"/>
      <stop offset="0.6" stop-color="#506595"/>
      <stop offset="1" stop-color="#F4B36A"/>
    </linearGradient>
    <clipPath id="round">
      <rect x="0" y="0" width="128" height="128" rx="24" ry="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Dawn ("daybreak") sky -->
    <rect x="0" y="0" width="128" height="86" fill="url(#sky)"/>
    <circle cx="64" cy="84" r="22" fill="#FBD49A" opacity="0.5"/>

    <!-- Golden Gate Bridge (original mark, International Orange) -->
    <g fill="none" stroke="#D8472B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M40,14 Q64,74 88,14"/>
      <path d="M10,58 Q22,32 40,14"/>
      <path d="M88,14 Q106,32 120,58"/>
    </g>
    <!-- suspender cables: vertical "signal" bars -->
    <g stroke="#E8633F" stroke-width="2.2" stroke-linecap="round">
      <line x1="49.6" y1="33" x2="49.6" y2="66"/>
      <line x1="54.4" y1="39" x2="54.4" y2="66"/>
      <line x1="59.2" y1="43" x2="59.2" y2="66"/>
      <line x1="64"   y1="44" x2="64"   y2="66"/>
      <line x1="68.8" y1="43" x2="68.8" y2="66"/>
      <line x1="73.6" y1="39" x2="73.6" y2="66"/>
      <line x1="78.4" y1="33" x2="78.4" y2="66"/>
    </g>
    <!-- towers -->
    <g fill="#D8472B">
      <rect x="36.5" y="12" width="7" height="68" rx="1.5"/>
      <rect x="84.5" y="12" width="7" height="68" rx="1.5"/>
      <rect x="34" y="28" width="12" height="3.2" rx="1.1"/>
      <rect x="34" y="42" width="12" height="3.2" rx="1.1"/>
      <rect x="82" y="28" width="12" height="3.2" rx="1.1"/>
      <rect x="82" y="42" width="12" height="3.2" rx="1.1"/>
    </g>
    <!-- roadway / deck -->
    <rect x="6" y="64" width="116" height="4" rx="1.5" fill="#E8633F"/>

    <!-- terminal strip: the extension name typed as a command -->
    <rect x="0" y="84" width="128" height="44" fill="#0E1C33"/>
    <rect x="0" y="84" width="128" height="2" fill="#24406B"/>
    <g font-family="'DejaVu Sans Mono','Liberation Mono',monospace" font-weight="700">
      <!-- prompt sign -->
      <text x="8" y="103" font-size="15" fill="#4FD0E0">&#8250;</text>
      <text x="20" y="103" font-size="12" fill="#F2F5FA">Cisco IOS</text>
      <text x="20" y="119" font-size="12" fill="#7FE0A8">IntelliSense</text>
      <!-- typing cursor block -->
      <rect x="108" y="110" width="7" height="10" rx="1" fill="#4FD0E0" opacity="0.9"/>
    </g>
  </g>
</svg>
